name: CI (Docker)

# Run this workflow only after the main CI workflow succeeds.
# It depends on the "CI/CD Pipeline" workflow (ci.yaml).
on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

jobs:
  test:
    name: Build image and run tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --tag pizzadeliveryapi:ci .

      - name: Run tests in Docker container
        run: |
          # Run pytest inside the container; override the default CMD
          docker run --rm pizzadeliveryapi:ci pytest -q
