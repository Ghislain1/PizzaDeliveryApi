name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: 3.12.4
        cache: "pip"

    - name: Build (install dependencies)
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    # Linting (runs always)
    - name: Lint with ruff
      run: |
        ruff check .
        ruff format --check .
    
    # Type checking (runs always)
    - name: Type checking with mypy
      run: |
        python -m mypy . || true  # Don't fail if mypy missing
    
    # TESTS: Check if tests exist → run only if they do
    - name: Run tests if tests directory exists
      run: |
        if [ -d "tests" ] || find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
          echo "✅ Tests found, running pytest..."
          rm -f test.db *.db
          DATABASE_URL=sqlite+aiosqlite:///./test.db python -m pytest tests/ -v
        else
          echo "ℹ️  No tests found, skipping pytest"
        fi
    
    # Coverage (only if tests ran)
    - name: Upload coverage
      if: success()
      uses: codecov/codecov-action@v4
    
    # Final status
    - name: Summary
      run: |
        echo "✅ Build successful!"
        echo "📁 Existing workflows:"
        find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null | head -5
